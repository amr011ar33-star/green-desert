<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}

/* الهيدر */
header {
  background: green;
  color: white;
  padding: 25px;
  font-size: 24px;
}

/* الأقسام */
section {
  padding: 40px 20px;
}

/* الخدمات */
.services div {
  background: white;
  margin: 10px;
  padding: 20px;
  border-radius: 10px;
}

/* المعرض */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 10px;
  padding: 10px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* عرض الصورة */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
}

.modal img {
  width: 80%;
  margin-top: 10%;
}

/* واتساب */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
🌿 Green Desert لتنسيق الحدائق
</header>

<section>

</section>

<section>

<div class="gallery">
  <img src="https://images.unsplash.com/photo-1597262975002-c5c3b14bbd62" onclick="openImg(this)">
  <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" onclick="openImg(this)">
  <img src="https://images.unsplash.com/photo-1499529112087-3cb3b73cec95" onclick="openImg(this)">

<div class="modal" id="modal" onclick="closeImg()">

</div>

<section>
<h2>تواصل معنا</h2>
<p>📞 0565543152</p>
</section>

<a class="whatsapp" href="https://wa.me/966565543152">💬</a>

<script>
function openImg(img){
  document.getElementById("modal").style.display="block";
  document.getElementById("modalImg").src=img.src;
}

function closeImg(){
  document.getElementById("modal").style.display="none";
}
</script>

</html>
