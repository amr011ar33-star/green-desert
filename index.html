<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تنسيق حدائق بالرياض | Green Desert</title>

<style>
body {
margin:0;
font-family:Tahoma;
background:#f5f5f5;
}

header {
background:#0a7d3b;
color:#fff;
text-align:center;
padding:25px;
}

header h1 {
margin:0;
font-size:28px;
}

header p {
margin-top:10px;
}

section {
padding:20px;
text-align:center;
}

.gallery {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.gallery img {
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover {
transform:scale(1.05);
}

#popup {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

#popup img {
width:85%;
max-width:400px;
border-radius:10px;
}

/* واتساب */
.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-size:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>
<h1>Green Desert</h1>
<p>تنسيق حدائق بالرياض - تصميم | تنفيذ | صيانة</p>
</header>

<section>
<h2>معرض أعمالنا</h2>

<p style="color:#555">نفذنا عشرات المشاريع في الرياض بأعلى جودة</p>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1597262975002-c5c3b14bbd62" onclick="openImg(this)">
<img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" onclick="openImg(this)">
<img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4" onclick="openImg(this)">
<img src="https://images.unsplash.com/photo-1585320806297-9794b3e4eeae" onclick="openImg(this)">
</div>

</section>

<!-- popup -->
<div id="popup" onclick="closeImg()">
<img id="popup-img">
</div>

<!-- زر واتساب -->
<a class="whatsapp" href="https://wa.me/966565543152" target="_blank">
تواصل واتساب
</a>

<script>
function openImg(img){
document.getElementById("popup").style.display="flex";
document.getElementById("popup-img").src=img.src;
}

function closeImg(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
