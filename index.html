<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Desert | تنسيق حدائق بالرياض</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5}

/* هيدر */
header {
  background:#0a7f3f;
  color:white;
  text-align:center;
  padding:25px;
  font-size:24px;
}

/* قسم رئيسي */
.hero {
  text-align:center;
  padding:30px;
}
.hero h1 {color:#0a7f3f}
.hero p {font-size:18px}

/* زر */
.btn {
  display:inline-block;
  background:#25d366;
  color:white;
  padding:12px 20px;
  border-radius:8px;
  text-decoration:none;
  margin-top:10px;
}

/* معرض */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}
.gallery img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

/* قبل وبعد */
.before-after {
  padding:20px;
}
.before-after img {
  width:100%;
  border-radius:10px;
}

/* تقييمات */
.reviews {
  background:#fff;
  padding:20px;
}
.review {
  background:#eee;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

/* تكبير */
.lightbox {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}
.lightbox img {
  max-width:90%;
  max-height:90%;
}

/* واتساب */
.whatsapp {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#25d366;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:22px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
🌿 Green Desert لتنسيق الحدائق بالرياض
</header>

<section class="hero">
<h1>حوّل حديقتك إلى جنة خضراء 🌴</h1>
<p>تنسيق حدائق - شبكات ري - عشب صناعي - شلالات</p>
<a class="btn" href="https://wa.me/966565543152">اطلب الخدمة الآن</a>
</section>

<!-- قبل وبعد -->
<section class="before-after">
<h2>قبل / بعد 🔥</h2>
<img src="https://images.unsplash.com/photo-1597262975002-c5c3b14bbd62">
</section>

<!-- معرض -->
<section class="gallery">
<img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1599687266725-1f9c1b0c95a0" onclick="openImage(this)">
</section>

<!-- تقييمات -->
<section class="reviews">
<h2>آراء العملاء ⭐</h2>
<div class="review">خدمة ممتازة وسرعة في التنفيذ 👍</div>
<div class="review">أفضل شركة تنسيق حدائق بالرياض 👌</div>
<div class="review">شغل احترافي وأنصح فيهم 🔥</div>
</section>

<div class="lightbox" id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<a class="whatsapp" href="https://wa.me/966565543152">📞</a>

<script>
function openImage(img){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;
}
function closeImage(){
document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
